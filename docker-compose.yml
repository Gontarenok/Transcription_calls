services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz').read()"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  worker-transcribe:
    build: .
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "-l", "INFO", "-Q", "q.transcribe", "--concurrency=1"]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  worker-light:
    build: .
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "-l", "INFO", "-Q", "q.classify,q.catalog,q.summarize", "--concurrency=1"]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  # Мониторинг Celery: воркеры, очереди, активные/завершённые задачи (см. README).
  flower:
    image: mher/flower:2.0
    env_file:
      - .env
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: ["celery", "flower", "--port=5555"]

