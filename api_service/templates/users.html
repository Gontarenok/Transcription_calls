{% extends "base.html" %}

{% block title %}Пользователи{% endblock %}

{% block content %}
<div class="card">
  <div class="page-head">
    <h2>Пользователи</h2>
  </div>

  <div class="actions">
    <div class="counter">Найдено пользователей: {{ rows|length }}</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>ID</th><th>ФИО</th><th>Domain</th><th>Department</th></tr></thead>
      <tbody>
      {% for u in rows %}
        <tr><td>{{ u.id }}</td><td>{{ u.full_name or '' }}</td><td>{{ u.domain or '' }}</td><td>{{ u.department or '' }}</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
