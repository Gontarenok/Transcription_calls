{% extends "base.html" %}

{% block title %}Пользователи{% endblock %}

{% block content %}
<div class="card">
  <div class="page-head">
    <h2>Пользователи</h2>
  </div>

  <div class="actions">
    <div class="counter">Найдено пользователей: {{ rows|length }}</div>
  </div>

  <div class="table-wrap">
    <table class="sortable-table">
      <thead><tr><th data-sort-type="num">ID</th><th data-sort-type="str">ФИО</th><th data-sort-type="str">Domain</th><th data-sort-type="str">Department</th></tr></thead>
      <tbody>
      {% for u in rows %}
        <tr>
          <td data-sort-value="{{ u.id }}">{{ u.id }}</td>
          <td data-sort-value="{{ (u.full_name or '')|e }}">{{ u.full_name or '' }}</td>
          <td data-sort-value="{{ (u.domain or '')|e }}">{{ u.domain or '' }}</td>
          <td data-sort-value="{{ (u.department or '')|e }}">{{ u.department or '' }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
