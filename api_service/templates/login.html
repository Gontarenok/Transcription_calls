{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block extra_head %}
<style>
  body { background: linear-gradient(135deg,#eff6ff,#f5f3ff); }
  .wrap { min-height: calc(100vh - 60px); display:flex; align-items:center; justify-content:center; padding: 24px 0; }
  .login-card { width: 440px; max-width: 92vw; background:#fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.1); padding: 22px; }
  .login-card h2 { margin: 0 0 6px; font-size: 20px; }
  .login-card p { color:#4b5563; margin: 0 0 14px; }
  .btn { margin-top: 14px; width:100%; border:none; border-radius: 12px; background:#4f46e5; color:#fff; padding:10px; cursor:pointer; font: inherit; }
  .err { color:#b91c1c; margin: 10px 0 0; }
</style>
{% endblock %}

{% block content %}
<div class="wrap">
  <div class="login-card">
    <h2>Transcription Calls</h2>
    <p>Введите API ключ для доступа.</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form action="/calls" method="get">
      <div class="api-wrap">
        <input id="api_key_global" type="password" name="api_key" value="{{ api_key or '' }}" placeholder="API key" required />
        <button type="button" class="eye" onclick="toggleKey()">👁</button>
      </div>
      <button class="btn" type="submit">Открыть</button>
    </form>
  </div>
</div>
{% endblock %}
