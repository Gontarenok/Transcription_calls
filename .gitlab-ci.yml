stages:
  - test
  - build
  - deploy

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  DOCKER_DRIVER: overlay2
  IMAGE_TAG: "$CI_COMMIT_SHA"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/transcription-calls"
  # Тест `verify_db_contract` поднимает схему через ORM (`db/init_db.py`) в сервисном PostgreSQL.
  # При необходимости переопределите в GitLab: Settings → CI/CD → Variables → DATABASE_URL (например внешний стенд).
  POSTGRES_DB: transcription_calls_ci
  POSTGRES_USER: ci
  POSTGRES_PASSWORD: ci
  POSTGRES_HOST_AUTH_METHOD: trust
  DATABASE_URL: "postgresql+psycopg2://ci:ci@postgres:5432/transcription_calls_ci"

test:
  stage: test
  image: python:3.11
  services:
    - name: postgres:15-alpine
      alias: postgres
  script:
    - pip install -r requirements.txt
    - python scripts/wait_for_postgres.py
    - python -c "from db.init_db import create_all; create_all()"
    - python db/verify_db_contract.py
  only:
    - branches

build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE_NAME:$IMAGE_TAG" .
    - docker push "$IMAGE_NAME:$IMAGE_TAG"
    - docker tag "$IMAGE_NAME:$IMAGE_TAG" "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:latest"
  only:
    - branches

deploy_prod:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 600 ~/.ssh/known_hosts
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  script:
    - >
      ssh "$DEPLOY_USER@$DEPLOY_HOST"
      "cd '$DEPLOY_PATH' &&
       export IMAGE_NAME='$IMAGE_NAME' IMAGE_TAG='$IMAGE_TAG' &&
       docker compose pull &&
       docker compose up -d --remove-orphans"
  environment:
    name: production
  only:
    - main
